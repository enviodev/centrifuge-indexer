  # Derived relations
  spokeBlockchains: [PoolSpokeBlockchain!]! @derivedFrom(field: "pool")
  tokens: [Token!]! @derivedFrom(field: "pool")
  snapshots: [PoolSnapshot!]! @derivedFrom(field: "pool")
