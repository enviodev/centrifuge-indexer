# --- Enums -------------------------------------------------------------------

enum VaultKind {
  Async
  Sync
  SyncDepositAsyncRedeem
}

enum VaultStatus {
  LinkInProgress
  UnlinkInProgress
  Linked
  Unlinked
}

enum InvestorTransactionType {
  DEPOSIT_REQUEST_UPDATED
  REDEEM_REQUEST_UPDATED
  DEPOSIT_REQUEST_CANCELLED
  REDEEM_REQUEST_CANCELLED
  DEPOSIT_REQUEST_EXECUTED
  REDEEM_REQUEST_EXECUTED
  DEPOSIT_CLAIMABLE
  REDEEM_CLAIMABLE
  DEPOSIT_CLAIMED
  REDEEM_CLAIMED
  SYNC_DEPOSIT
  SYNC_REDEEM
  TRANSFER_IN
  TRANSFER_OUT
}

enum HoldingAccountType {
  Asset
  Equity
  Loss
  Gain
  Expense
  Liability
}

enum CrosschainPayloadStatus {
  Underpaid
  InTransit
  Delivered
  PartiallyFailed
  Completed
}

enum CrosschainMessageStatus {
  Unsent
  AwaitingBatchDelivery
  Failed
  Executed
}

enum AdapterParticipationType {
  PAYLOAD
  PROOF
}

enum AdapterParticipationSide {
  SEND
  HANDLE
}

# --- Core Entities -----------------------------------------------------------

type Blockchain {
  id: ID!
  centrifugeId: String!
  network: String!
  lastPeriodStart: Int
  chainId: Int
  name: String
  explorer: String
  icon: String
  # Derived relations
  hubPools: [Pool!]! @derivedFrom(field: "blockchain")
  spokePools: [PoolSpokeBlockchain!]! @derivedFrom(field: "blockchain")
  tokens: [Token!]! @derivedFrom(field: "blockchain")
  tokenInstances: [TokenInstance!]! @derivedFrom(field: "blockchain")
  vaults: [Vault!]! @derivedFrom(field: "blockchain")
  assets: [Asset!]! @derivedFrom(field: "blockchain")
  assetRegistrations: [AssetRegistration!]! @derivedFrom(field: "blockchain")
  investorTransactions: [InvestorTransaction!]! @derivedFrom(field: "blockchain")
  holdings: [Holding!]! @derivedFrom(field: "blockchain")
  holdingEscrows: [HoldingEscrow!]! @derivedFrom(field: "blockchain")
  escrows: [Escrow!]! @derivedFrom(field: "blockchain")
}

type Deployment {
  id: ID! # chainId
  chainId: String!
  centrifugeId: String!
  globalEscrow: String
  blockchain: Blockchain!
  createdAt: Int!
  createdAtBlock: Int!
  createdAtTxHash: String!
  updatedAt: Int!
  updatedAtBlock: Int!
  updatedAtTxHash: String!
}

type Pool {
  id: ID! # poolId (bigint as string)
  centrifugeId: String! @index
  isActive: Boolean!
  currency: BigInt
  decimals: Int
  metadata: String
  name: String
  blockchain: Blockchain!
