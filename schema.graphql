  createdAtBlock: Int!
  createdAtTxHash: String!
  updatedAt: Int!
  updatedAtBlock: Int!
  updatedAtTxHash: String!
}

type PoolSpokeBlockchain {
  id: ID! # poolId-centrifugeId
  poolId: BigInt!
