  - event: ApproveRedeems(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed
      payoutAssetId, uint32 epoch, uint128 approvedShareAmount, uint128 pendingShareAmount)
  - event: IssueShares(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed
