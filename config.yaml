name: centrifuge-indexer
description: Centrifuge Protocol Indexer
field_selection:
  transaction_fields:
  - hash
contracts:
- name: HubRegistry
  abi_file_path: abis/HubRegistry.json
  handler: src/handlers/HubRegistry.ts
  events:
  - event: NewPool(uint64 poolId, address indexed manager, uint128 indexed currency)
  - event: NewAsset(uint128 indexed assetId, uint8 decimals)
  - event: UpdateCurrency(uint64 indexed poolId, uint128 currency)
  - event: UpdateManager(uint64 indexed poolId, address indexed manager, bool canManage)
  - event: SetMetadata(uint64 indexed poolId, bytes metadata)
- name: Hub
  abi_file_path: abis/Hub.json
  handler: src/handlers/Hub.ts
  events:
  - event: NotifyPool(uint16 indexed centrifugeId, uint64 indexed poolId)
  - event: NotifyShareClass(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16
      scId)
  - event: NotifyShareMetadata(uint16 indexed centrifugeId, uint64 indexed poolId,
      bytes16 scId, string name, string symbol)
  - event: NotifySharePrice(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16
      scId, uint128 poolPerShare)
  - event: NotifyAssetPrice(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16
      scId, uint128 assetId, uint128 pricePoolPerAsset)
  - event: UpdateVault(uint64 indexed poolId, bytes16 scId, uint128 assetId, bytes32
      vaultOrFactory, uint8 kind)
  - event: UpdateRestriction(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16
      scId, bytes payload)
  - event: UpdateShareHook(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16
      scId, bytes32 hook)
  - event: ForwardTransferShares(uint16 indexed centrifugeId, uint64 indexed poolId,
      bytes16 scId, bytes32 receiver, uint128 amount)
  - event: UpdateContract(uint16 centrifugeId, uint64 poolId, bytes16 scId, bytes32
      target, bytes payload)
- name: Spoke
  abi_file_path: abis/Spoke.json
  handler: src/handlers/Spoke.ts
  events:
  - event: AddPool(uint64 indexed poolId)
  - event: AddShareClass(uint64 indexed poolId, bytes16 indexed scId, address token)
  - event: DeployVault(uint64 indexed poolId, bytes16 indexed scId, address indexed
      asset, uint256 tokenId, address factory, address vault, uint8 kind)
  - event: RegisterAsset(uint128 indexed assetId, address indexed asset, uint256 indexed
      tokenId, string name, string symbol, uint8 decimals, bool isInitialization)
  - event: UpdateSharePrice(uint64 indexed poolId, bytes16 indexed scId, uint256 price,
      uint64 computedAt)
  - event: UpdateAssetPrice(uint64 indexed poolId, bytes16 indexed scId, address indexed
      asset, uint256 tokenId, uint256 price, uint64 computedAt)
  - event: LinkVault(uint64 indexed poolId, bytes16 indexed scId, address indexed
      asset, uint256 tokenId, address vault)
  - event: UnlinkVault(uint64 indexed poolId, bytes16 indexed scId, address indexed
      asset, uint256 tokenId, address vault)
  - event: InitiateTransferShares(uint16 centrifugeId, uint64 indexed poolId, bytes16
      indexed scId, address indexed sender, bytes32 destinationAddress, uint128 amount)
  - event: ExecuteTransferShares(uint64 indexed poolId, bytes16 indexed scId, address
      indexed receiver, uint128 amount)
  - event: SetRequestManager(uint64 indexed poolId, bytes16 indexed scId, uint128
      indexed assetId, address manager)
- name: Gateway
  abi_file_path: abis/Gateway.json
  handler: src/handlers/Gateway.ts
  events:
  - event: PrepareMessage(uint16 indexed centrifugeId, uint64 poolId, bytes message)
  - event: ExecuteMessage(uint16 indexed centrifugeId, bytes message)
  - event: FailMessage(uint16 indexed centrifugeId, bytes message, bytes error)
  - event: UnderpaidBatch(uint16 indexed centrifugeId, bytes batch)
  - event: RepayBatch(uint16 indexed centrifugeId, bytes batch)
- name: BalanceSheet
  abi_file_path: abis/BalanceSheet.json
  handler: src/handlers/BalanceSheet.ts
  events:
  - event: Deposit(uint64 indexed poolId, bytes16 indexed scId, address asset, uint256
      tokenId, uint128 amount)
  - event: Withdraw(uint64 indexed poolId, bytes16 indexed scId, address asset, uint256
      tokenId, address receiver, uint128 amount, uint128 pricePoolPerAsset)
  - event: NoteDeposit(uint64 indexed poolId, bytes16 indexed scId, address asset,
      uint256 tokenId, uint128 amount, uint128 pricePoolPerAsset)
  - event: Issue(uint64 indexed poolId, bytes16 indexed scId, address to, uint128
      pricePoolPerShare, uint128 shares)
  - event: Revoke(uint64 indexed poolId, bytes16 indexed scId, address from, uint128
      pricePoolPerShare, uint128 shares)
  - event: UpdateManager(uint64 indexed poolId, address who, bool canManage)
  - event: TransferSharesFrom(uint64 indexed poolId, bytes16 indexed scId, address
      sender, address indexed from, address to, uint256 amount)
- name: Holdings
  abi_file_path: abis/Holdings.json
  handler: src/handlers/Holdings.ts
  events:
  - event: Initialize(uint64 indexed, bytes16 scId, uint128 indexed assetId, address
      valuation, bool isLiability, (uint32,uint8)[] accounts)
    name: Initialize
  - event: Increase(uint64 indexed, bytes16 scId, uint128 indexed assetId, uint128
