# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: centrifuge-indexer
description: Centrifuge Protocol Indexer

field_selection:
  transaction_fields:
    - "hash"

contracts:
  # ==========================================================================
  # Singleton Contracts
  # ==========================================================================

  - name: HubRegistry
    abi_file_path: abis/HubRegistry.json
    handler: src/handlers/HubRegistry.ts
    events:
      - event: "NewPool(uint64 poolId, address indexed manager, uint128 indexed currency)"
      - event: "NewAsset(uint128 indexed assetId, uint8 decimals)"
      - event: "UpdateCurrency(uint64 indexed poolId, uint128 currency)"
      - event: "UpdateManager(uint64 indexed poolId, address indexed manager, bool canManage)"
      - event: "SetMetadata(uint64 indexed poolId, bytes metadata)"

  - name: Hub
    abi_file_path: abis/Hub.json
    handler: src/handlers/Hub.ts
    events:
      - event: "NotifyPool(uint16 indexed centrifugeId, uint64 indexed poolId)"
      - event: "NotifyShareClass(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16 scId)"
      - event: "NotifyShareMetadata(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16 scId, string name, string symbol)"
      - event: "NotifySharePrice(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16 scId, uint128 poolPerShare)"
      - event: "NotifyAssetPrice(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16 scId, uint128 assetId, uint128 pricePoolPerAsset)"
      - event: "UpdateVault(uint64 indexed poolId, bytes16 scId, uint128 assetId, bytes32 vaultOrFactory, uint8 kind)"
      - event: "UpdateRestriction(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16 scId, bytes payload)"
      - event: "UpdateShareHook(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16 scId, bytes32 hook)"
      - event: "ForwardTransferShares(uint16 indexed centrifugeId, uint64 indexed poolId, bytes16 scId, bytes32 receiver, uint128 amount)"

  - name: Spoke
    abi_file_path: abis/Spoke.json
    handler: src/handlers/Spoke.ts
    events:
      - event: "AddPool(uint64 indexed poolId)"
      - event: "AddShareClass(uint64 indexed poolId, bytes16 indexed scId, address token)"
      - event: "DeployVault(uint64 indexed poolId, bytes16 indexed scId, address indexed asset, uint256 tokenId, address factory, address vault, uint8 kind)"
      - event: "RegisterAsset(uint128 indexed assetId, address indexed asset, uint256 indexed tokenId, string name, string symbol, uint8 decimals, bool isInitialization)"
      - event: "UpdateSharePrice(uint64 indexed poolId, bytes16 indexed scId, uint256 price, uint64 computedAt)"
      - event: "UpdateAssetPrice(uint64 indexed poolId, bytes16 indexed scId, address indexed asset, uint256 tokenId, uint256 price, uint64 computedAt)"
      - event: "LinkVault(uint64 indexed poolId, bytes16 indexed scId, address indexed asset, uint256 tokenId, address vault)"
      - event: "UnlinkVault(uint64 indexed poolId, bytes16 indexed scId, address indexed asset, uint256 tokenId, address vault)"
      - event: "InitiateTransferShares(uint16 centrifugeId, uint64 indexed poolId, bytes16 indexed scId, address indexed sender, bytes32 destinationAddress, uint128 amount)"
      - event: "ExecuteTransferShares(uint64 indexed poolId, bytes16 indexed scId, address indexed receiver, uint128 amount)"
      - event: "SetRequestManager(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed assetId, address manager)"

  - name: Gateway
    abi_file_path: abis/Gateway.json
    handler: src/handlers/Gateway.ts
    events:
      - event: "PrepareMessage(uint16 indexed centrifugeId, uint64 poolId, bytes message)"
      - event: "ExecuteMessage(uint16 indexed centrifugeId, bytes message)"
      - event: "FailMessage(uint16 indexed centrifugeId, bytes message, bytes error)"
      - event: "UnderpaidBatch(uint16 indexed centrifugeId, bytes batch)"
      - event: "RepayBatch(uint16 indexed centrifugeId, bytes batch)"

  - name: BalanceSheet
    abi_file_path: abis/BalanceSheet.json
    handler: src/handlers/BalanceSheet.ts
    events:
      - event: "Deposit(uint64 indexed poolId, bytes16 indexed scId, address asset, uint256 tokenId, uint128 amount)"
      - event: "Withdraw(uint64 indexed poolId, bytes16 indexed scId, address asset, uint256 tokenId, address receiver, uint128 amount, uint128 pricePoolPerAsset)"
      - event: "NoteDeposit(uint64 indexed poolId, bytes16 indexed scId, address asset, uint256 tokenId, uint128 amount, uint128 pricePoolPerAsset)"
      - event: "Issue(uint64 indexed poolId, bytes16 indexed scId, address to, uint128 pricePoolPerShare, uint128 shares)"
      - event: "Revoke(uint64 indexed poolId, bytes16 indexed scId, address from, uint128 pricePoolPerShare, uint128 shares)"
      - event: "UpdateManager(uint64 indexed poolId, address who, bool canManage)"
      - event: "TransferSharesFrom(uint64 indexed poolId, bytes16 indexed scId, address sender, address indexed from, address to, uint256 amount)"

  - name: Holdings
    abi_file_path: abis/Holdings.json
    handler: src/handlers/Holdings.ts
    events:
      - event: "Initialize(uint64 indexed, bytes16 scId, uint128 indexed assetId, address valuation, bool isLiability, (uint32,uint8)[] accounts)"
        name: "Initialize"
      - event: "Increase(uint64 indexed, bytes16 scId, uint128 indexed assetId, uint128 pricePoolPerAsset, uint128 amount, uint128 increasedValue)"
        name: "Increase"
      - event: "Decrease(uint64 indexed, bytes16 scId, uint128 indexed assetId, uint128 pricePoolPerAsset, uint128 amount, uint128 decreasedValue)"
        name: "Decrease"
      - event: "Update(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed assetId, bool isPositive, uint128 diffValue)"
      - event: "UpdateValuation(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed assetId, address valuation)"
      - event: "UpdateIsLiability(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed assetId, bool isLiability)"
      - event: "SetAccountId(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed assetId, uint8 kind, uint32 accountId)"

  - name: ShareClassManager
    abi_file_path: abis/ShareClassManager.json
    handler: src/handlers/ShareClassManager.ts
    events:
      - event: "AddShareClass(uint64 indexed poolId, bytes16 indexed scId, uint32 indexed index, string name, string symbol, bytes32 salt)"
        name: "AddShareClassLong"
      - event: "AddShareClass(uint64 indexed poolId, bytes16 indexed scId, uint32 indexed index)"
        name: "AddShareClassShort"
      - event: "UpdateMetadata(uint64 indexed poolId, bytes16 indexed scId, string name, string symbol)"
      - event: "UpdateShareClass(uint64 indexed poolId, bytes16 indexed scId, uint128 navPoolPerShare)"
      - event: "UpdatePricePoolPerShare(uint64 indexed poolId, bytes16 indexed scId, uint128 price, uint64 computedAt)"
      - event: "UpdateDepositRequest(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed depositAssetId, uint32 epoch, bytes32 investor, uint128 pendingUserAssetAmount, uint128 pendingTotalAssetAmount, uint128 queuedUserAssetAmount, bool pendingCancellation)"
      - event: "UpdateRedeemRequest(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed payoutAssetId, uint32 epoch, bytes32 investor, uint128 pendingUserShareAmount, uint128 pendingTotalShareAmount, uint128 queuedUserShareAmount, bool pendingCancellation)"
      - event: "ApproveDeposits(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed depositAssetId, uint32 epoch, uint128 approvedPoolAmount, uint128 approvedAssetAmount, uint128 pendingAssetAmount)"
      - event: "ApproveRedeems(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed payoutAssetId, uint32 epoch, uint128 approvedShareAmount, uint128 pendingShareAmount)"
      - event: "IssueShares(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed depositAssetId, uint32 epoch, uint128 navPoolPerShare, uint128 navAssetPerShare, uint128 issuedShareAmount)"
      - event: "RevokeShares(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed payoutAssetId, uint32 epoch, uint128 navPoolPerShare, uint128 navAssetPerShare, uint128 revokedShareAmount, uint128 revokedAssetAmount, uint128 revokedPoolAmount)"
      - event: "ClaimDeposit(uint64 indexed poolId, bytes16 indexed scId, uint32 epoch, bytes32 investor, uint128 indexed depositAssetId, uint128 paymentAssetAmount, uint128 pendingAssetAmount, uint128 claimedShareAmount, uint64 issuedAt)"
      - event: "ClaimRedeem(uint64 indexed poolId, bytes16 indexed scId, uint32 epoch, bytes32 investor, uint128 indexed payoutAssetId, uint128 paymentShareAmount, uint128 pendingShareAmount, uint128 claimedAssetAmount, uint64 revokedAt)"
      - event: "RemoteIssueShares(uint16 centrifugeId, uint64 indexed poolId, bytes16 indexed scId, uint128 issuedShareAmount)"
      - event: "RemoteRevokeShares(uint16 centrifugeId, uint64 indexed poolId, bytes16 indexed scId, uint128 revokedShareAmount)"

  - name: MultiAdapter
    abi_file_path: abis/MultiAdapter.json
    handler: src/handlers/MultiAdapter.ts
    events:
      - event: "SendPayload(uint16 indexed centrifugeId, bytes32 indexed payloadId, bytes payload, address adapter, bytes32 adapterData, address refund)"
      - event: "SendProof(uint16 indexed centrifugeId, bytes32 indexed payloadId, bytes32 payloadHash, address adapter, bytes32 adapterData)"
      - event: "HandlePayload(uint16 indexed centrifugeId, bytes32 indexed payloadId, bytes payload, address adapter)"
      - event: "HandleProof(uint16 indexed centrifugeId, bytes32 indexed payloadId, bytes32 payloadHash, address adapter)"
      - event: "File(bytes32 indexed what, uint16 centrifugeId, address[] adapters)"
        name: "FileAdapters"

  - name: MultiAdapterV3_1
    abi_file_path: abis/MultiAdapterV3_1.json
    handler: src/handlers/MultiAdapter.ts
    events:
      - event: "SendPayload(uint16 indexed centrifugeId, bytes32 indexed payloadId, bytes payload, address adapter, bytes32 adapterData, uint256 gasLimit, uint256 gasPaid, address refund)"
        name: "SendPayloadV3_1"
      - event: "HandlePayload(uint16 indexed centrifugeId, bytes32 indexed payloadId, bytes payload, address adapter)"
        name: "HandlePayloadV3_1"

  - name: PoolEscrowFactory
    abi_file_path: abis/PoolEscrowFactory.json
    handler: src/handlers/PoolEscrowFactory.ts
    events:
      - event: "DeployPoolEscrow(uint64 indexed poolId, address indexed escrow)"

  - name: MerkleProofManagerFactory
    abi_file_path: abis/MerkleProofManagerFactory.json
    handler: src/handlers/MerkleProofManager.ts
    events:
      - event: "DeployMerkleProofManager(uint64 indexed poolId, address indexed manager)"

  - name: OnOfframpManagerFactory
    abi_file_path: abis/OnOfframpManagerFactory.json
    handler: src/handlers/OnOffRampManager.ts
    events:
      - event: "DeployOnOfframpManager(uint64 indexed poolId, bytes16 scId, address indexed manager)"

  - name: BatchRequestManager
    abi_file_path: abis/AsyncRequestManager.json
    handler: src/handlers/BatchRequestManager.ts
    events:
      - event: "AddVault(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed assetId, address vault)"
      - event: "RemoveVault(uint64 indexed poolId, bytes16 indexed scId, uint128 indexed assetId, address vault)"
      - event: "TriggerRedeemRequest(uint64 indexed poolId, bytes16 indexed scId, address user, address indexed asset, uint256 tokenId, uint128 shares)"

  # ==========================================================================
  # Factory-Deployed Contracts (dynamically registered via contractRegister)
  # ==========================================================================

  - name: Vault
    abi_file_path: abis/AsyncVault.json
    handler: src/handlers/Vault.ts
    events:
      - event: "DepositRequest(address indexed controller, address indexed owner, uint256 indexed requestId, address sender, uint256 assets)"
      - event: "RedeemRequest(address indexed controller, address indexed owner, uint256 indexed requestId, address sender, uint256 shares)"
      - event: "DepositClaimable(address indexed controller, uint256 indexed requestId, uint256 assets, uint256 shares)"
      - event: "RedeemClaimable(address indexed controller, uint256 indexed requestId, uint256 assets, uint256 shares)"
      - event: "Deposit(address indexed sender, address indexed owner, uint256 assets, uint256 shares)"
      - event: "Withdraw(address indexed sender, address indexed receiver, address indexed owner, uint256 assets, uint256 shares)"
      - event: "CancelDepositRequest(address indexed controller, uint256 indexed requestId, address sender)"
      - event: "CancelDepositClaim(address indexed controller, address indexed receiver, uint256 indexed requestId, address sender, uint256 assets)"
      - event: "CancelDepositClaimable(address indexed controller, uint256 indexed requestId, uint256 assets)"
      - event: "CancelRedeemRequest(address indexed controller, uint256 indexed requestId, address sender)"
      - event: "CancelRedeemClaim(address indexed controller, address indexed receiver, uint256 indexed requestId, address sender, uint256 shares)"
      - event: "CancelRedeemClaimable(address indexed controller, uint256 indexed requestId, uint256 shares)"

  - name: PoolEscrow
    abi_file_path: abis/PoolEscrow.json
    handler: src/handlers/PoolEscrowFactory.ts
    events:
      - event: "Deposit(address indexed asset, uint256 indexed tokenId, uint64 indexed poolId, bytes16 scId, uint128 value)"
        name: "EscrowDeposit"
      - event: "Withdraw(address indexed asset, uint256 indexed tokenId, uint64 indexed poolId, bytes16 scId, uint128 value)"
        name: "EscrowWithdraw"

  - name: OnOfframpManager
    abi_file_path: abis/OnOfframpManager.json
    handler: src/handlers/OnOffRampManager.ts
    events:
      - event: "UpdateRelayer(address indexed relayer, bool isEnabled)"
      - event: "UpdateOnramp(address indexed asset, bool isEnabled)"
      - event: "UpdateOfframp(address indexed asset, address receiver, bool isEnabled)"

  - name: MerkleProofManager
    abi_file_path: abis/MerkleProofManager.json
    handler: src/handlers/MerkleProofManager.ts
    events:
      - event: "UpdatePolicy(address indexed strategist, bytes32 oldRoot, bytes32 newRoot)"

  - name: TokenInstance
    abi_file_path: abis/ERC20.json
    handler: src/handlers/TokenInstance.ts
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  - name: VaultRegistry
    abi_file_path: abis/Spoke.json
    handler: src/handlers/VaultRegistry.ts
    events:
      - event: "DeployVault(uint64 indexed poolId, bytes16 indexed scId, address indexed asset, uint256 tokenId, address factory, address vault, uint8 kind)"
        name: "VaultRegistryDeployVault"
      - event: "LinkVault(uint64 indexed poolId, bytes16 indexed scId, address indexed asset, uint256 tokenId, address vault)"
        name: "VaultRegistryLinkVault"
      - event: "UnlinkVault(uint64 indexed poolId, bytes16 indexed scId, address indexed asset, uint256 tokenId, address vault)"
        name: "VaultRegistryUnlinkVault"

